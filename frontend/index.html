<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>NICESHOT</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Step 0: 스플래시 -->
  <div id="step0" class="step active">
    <div class="center">
      <h1 class="logo">NICESHOT</h1>
      <p class="hint">골프 스윙 AI 코치</p>
    </div>
    <button class="btn btn-primary" onclick="goStep(2)">시작하기</button>
  </div>

  <!-- Step 2: 클럽 선택 + 고민 (통합) -->
  <div id="step2" class="step">
    <h2 class="question-top">클럽 선택</h2>
    <div class="club-grid" id="clubGrid"></div>
    <div class="concern-inline">
      <input type="text" id="concernInput" class="concern-input" placeholder="고민이 있다면 한 줄로 (선택)" />
    </div>
    <button class="btn btn-primary" id="btnClubNext" onclick="startPractice()" disabled>촬영 시작</button>
  </div>

  <!-- Step 6: 카메라 세팅 -->
  <div id="step6" class="step step-camera">
    <div class="video-wrap">
      <video id="previewVideo" autoplay playsinline muted></video>
      <canvas id="poseOverlay"></canvas>
      <div class="frame-guide"></div>
      <div class="pill" id="framePill">전신이 프레임 안에 들어오게 서주세요</div>
      <div class="voice-indicator" id="voiceIndicator">
        <span class="mic">🎤</span>
        <span id="voiceStatusText">음성 준비 중...</span>
      </div>
      <div class="voice-heard" id="voiceHeard"></div>
    </div>
    <div class="camera-bar">
      <p id="cameraStatus">카메라 켜는 중...</p>
      <p id="camTip" class="cam-tip"></p>
    </div>
  </div>

  <!-- Step 7: 녹화 -->
  <div id="step7" class="step step-camera">
    <div class="video-wrap">
      <video id="recordVideo" autoplay playsinline muted></video>
      <div class="club-label" id="clubLabel"></div>
      <div class="record-overlay">
        <p id="recordPhase" class="record-phase">준비 중</p>
        <p id="recordCountdown" class="record-countdown"></p>
      </div>
      <div class="between-guide" id="betweenGuide" style="display:none"></div>
      <div class="voice-indicator" id="voiceIndicator2">
        <span class="mic">🎤</span>
        <span id="voiceStatusText2">음성 듣는 중</span>
      </div>
      <div class="voice-heard" id="voiceHeard2"></div>
    </div>
  </div>

  <!-- Step 9: 결과 (핵심 카드 + 상세) -->
  <div id="step9" class="step step-results">
    <div id="scoreCardWrap" class="scorecard-wrap"></div>
    <div class="result-actions">
      <button class="btn btn-primary" onclick="practiceAgain()">다시 촬영</button>
      <button class="btn btn-secondary" onclick="resetAll()">처음으로</button>
    </div>
  </div>

  <!-- Step 10: 슬로모션 교정 영상 -->
  <div id="step10" class="step step-slowmo">
    <div class="slowmo-top">
      <button class="slowmo-back" onclick="goStep(9)">← 결과</button>
      <span class="slowmo-title">교정 영상</span>
    </div>

    <div class="slowmo-video-wrap" id="slowmoTapArea">
      <video id="slowmoVideo" playsinline muted></video>
      <canvas id="slowmoCanvas"></canvas>
      <div class="phase-badge" id="phaseBadge"></div>
      <div class="phase-indicator" id="phaseIndicator"></div>
      <div class="tap-hint" id="tapHint">탭하여 다음 구간 ▶</div>
    </div>

    <div class="slowmo-controls">
      <div class="slowmo-timeline" id="slowmoTimeline">
        <div class="timeline-bg"></div>
        <div class="timeline-progress" id="timelineProgress"></div>
        <div class="phase-dots" id="phaseDots"></div>
      </div>
    </div>
    <div class="slowmo-annotation" id="slowmoAnnotation"></div>
    <button class="btn btn-secondary" onclick="goStep(9)" style="margin:8px 24px 24px">← 결과로 돌아가기</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="utils.js"></script>
  <script src="analysis.js"></script>
  <script src="camera.js"></script>
  <script src="results.js"></script>
  <script src="app.js"></script>

  <script>
    var _origSetVoice = window.setVoiceStatus;
    window.setVoiceStatus = function(s) {
      if (_origSetVoice) _origSetVoice(s);
      var ind2 = document.getElementById('voiceIndicator2');
      var txt2 = document.getElementById('voiceStatusText2');
      if (ind2) {
        if (s === 'on') { ind2.classList.add('listening'); if (txt2) txt2.textContent = '음성 듣는 중 — "시작" / "다시"'; }
        else { ind2.classList.remove('listening'); if (txt2) txt2.textContent = '음성 인식 꺼짐'; }
      }
    };
    window.showVoiceHeard = function(text) {
      ['voiceHeard','voiceHeard2'].forEach(function(id) {
        var el = document.getElementById(id);
        if (!el) return;
        el.textContent = '"' + text + '"';
        el.style.opacity = '1';
        clearTimeout(el._t);
        el._t = setTimeout(function() { el.style.opacity = '0'; }, 1800);
      });
    };
  </script>
</body>
</html>
