<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>NICESHOT</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Step 0: 스플래시 -->
  <div id="step0" class="step active">
    <div class="center">
      <h1 class="logo">NICESHOT</h1>
      <p class="hint">골프 스윙 AI 코치</p>
    </div>
    <button class="btn btn-primary" onclick="goStep(1)">시작하기</button>
  </div>

  <!-- Step 1: 시작 확인 -->
  <div id="step1" class="step">
    <div class="center">
      <h2 class="question">스윙 연습을<br>시작하시겠습니까?</h2>
    </div>
    <button class="btn btn-primary" onclick="goStep(2)">시작하기</button>
  </div>

  <!-- Step 2: 클럽 선택 -->
  <div id="step2" class="step">
    <h2 class="question-top">몇 번 클럽으로<br>연습하실 건가요?</h2>
    <div class="club-grid" id="clubGrid"></div>
    <button class="btn btn-primary" id="btnClubNext" onclick="goStep(3)" disabled>다음</button>
  </div>

  <!-- Step 3: 스윙 횟수 -->
  <div id="step3" class="step">
    <div class="center">
      <h2 class="question">몇 번 스윙을<br>하실 건가요?</h2>
      <div class="chip-row">
        <button class="chip" onclick="selectCount(1,this)">1회</button>
        <button class="chip" onclick="selectCount(2,this)">2회</button>
        <button class="chip" onclick="selectCount(3,this)">3회</button>
        <button class="chip" onclick="selectCount(4,this)">4회</button>
        <button class="chip" onclick="selectCount(5,this)">5회</button>
      </div>
    </div>
    <button class="btn btn-primary" id="btnCountNext" onclick="goStep(4)" disabled>다음</button>
  </div>

  <!-- Step 4: 고민 입력 -->
  <div id="step4" class="step">
    <div class="center">
      <h2 class="question">스윙 시 고민이<br>무엇인가요?</h2>
      <textarea id="concernInput" class="textarea" placeholder="예: 슬라이스가 심해요, 어드레스가 불안정해요..."></textarea>
    </div>
    <button class="btn btn-outline" onclick="skipConcern()">선택 안함</button>
    <button class="btn btn-primary" onclick="confirmConcern()">다음</button>
  </div>

  <!-- Step 5: 요약 및 시작 -->
  <div id="step5" class="step">
    <div class="center">
      <h2 class="question">연습 준비 완료</h2>
      <div class="summary-box">
        <p class="summary-row">클럽: <strong id="summaryClub">-</strong></p>
        <p class="summary-row">스윙 횟수: <strong id="summaryCount">-</strong>회</p>
        <p class="summary-row" id="concernRow" style="display:none">고민: <span id="summaryConern" class="concern-text"></span></p>
      </div>
    </div>
    <button class="btn btn-primary" onclick="startPractice()">📹 연습 시작</button>
  </div>

  <!-- Step 6: 카메라 세팅 -->
  <div id="step6" class="step step-camera">
    <div class="video-wrap">
      <video id="previewVideo" autoplay playsinline muted></video>
      <canvas id="poseOverlay"></canvas>
      <div class="frame-guide"></div>
      <div class="pill" id="framePill">전신이 프레임 안에 들어오게 서주세요</div>
    </div>
    <div class="camera-bar">
      <p id="cameraStatus">카메라 켜는 중...</p>
    </div>
  </div>

  <!-- Step 7: 녹화 -->
  <div id="step7" class="step step-camera">
    <div class="video-wrap">
      <video id="recordVideo" autoplay playsinline muted></video>
      <div class="record-overlay">
        <p id="recordPhase" class="record-phase">준비 중</p>
        <p id="recordCountdown" class="record-countdown"></p>
      </div>
    </div>
  </div>

  <!-- Step 8: 녹화 완료 -->
  <div id="step8" class="step">
    <div class="center">
      <div class="icon-big">✅</div>
      <h2 class="question">녹화 완료!</h2>
      <p class="hint"><span id="clipCount">0</span>개 클립이 저장됐습니다</p>
    </div>
    <button class="btn btn-primary" onclick="uploadAndAnalyze()">🤖 AI 코칭 받기</button>
  </div>

  <!-- Step 9: 결과 -->
  <div id="step9" class="step step-results">
    <h2 class="question-top">AI 코칭 결과</h2>
    <div id="resultsWrap" class="results-wrap"></div>
    <button class="btn btn-secondary" onclick="resetAll()">처음부터 다시하기</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
